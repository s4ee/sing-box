name: Sing-Box
on:
  workflow_dispatch:
    inputs:
      SOURCE:
        description: "Source ..."
        required: true
        default: sagernet
        type: choice
        options:
          - sagernet
          - qjebbs
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NAME: sing-box
      TAGS: with_gvisor,with_quic,with_dhcp,with_ech,with_utls,with_clash_api,with_provider_loadbalance
    steps:
      - name: Source
        id: source
        run: |
          SOURCE=${{ github.event.inputs.SOURCE }}
          REPO=''
          REF=''
          case "$SOURCE" in
            sagernet)
              REPO=SagerNet/sing-box
              REF=dev-next
              ;;
            qjebbs)
              REPO=qjebbs/sing-box
              REF=building
              ;;
            *)
              echo "[!] Unknown ${SOURCE}"
              exit 1
              ;;
          esac
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "SOURCE=$SOURCE" >> $GITHUB_ENV
